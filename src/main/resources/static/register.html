<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园AI失物招领 - 注册</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="./http.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div id="app" class="bg-white p-8 rounded-lg shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">用户注册</h2>

    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">用户名</label>
            <input v-model="form.username" type="text" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500" placeholder="请输入用户名">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">密码</label>
            <input v-model="form.password" type="password" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500" placeholder="请输入密码">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">确认密码</label>
            <input v-model="form.confirmPassword" type="password" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500" placeholder="请再次输入密码">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">邮箱</label>
            <input v-model="form.email" type="email" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500" placeholder="example@edu.cn">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">手机号</label>
            <input v-model="form.phone" type="text" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500" placeholder="请输入手机号">
        </div>

        <div v-if="message" :class="'text-red-500'" class="mt-4 text-center text-sm font-bold">
            {{ message }}
        </div>

        <button @click="handleRegister" :disabled="loading" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 transition disabled:bg-gray-400 font-bold">
            {{ loading ? '提交中...' : '立即注册' }}
        </button>

        <div class="text-center mt-4">
            <span class="text-sm text-gray-600">已有账号？</span>
            <a href="login.html" class="text-sm text-blue-600 hover:underline font-medium">前去登录</a>
        </div>
    </div>
</div>

<script>
    const { createApp, ref } = Vue;

    createApp({
        setup() {
            const form = ref({
                username: '',
                password: '',
                confirmPassword: '',
                email: '',
                phone: ''
            });

            const loading = ref(false);
            const message = ref('');

            const handleRegister = async () => {
                // 基本前端校验
                if (!form.value.username || !form.value.password) {
                    message.value = '用户名和密码不能为空';
                    return;
                }
                if (!form.value.email) {
                    message.value = '邮箱不能为空';
                    return;
                }
                if (!form.value.phone) {
                    message.value = '手机号不能为空';
                    return;
                }
                if (form.value.password !== form.value.confirmPassword) {
                    message.value = '两次密码不一致';
                    return;
                }

                loading.value = true;

                try {
                    // 构造发送给后端的数据对象
                    const requestData = {
                        username: form.value.username,
                        password: form.value.password,
                        confirmPassword: form.value.confirmPassword,
                        email: form.value.email,
                        phone: form.value.phone
                    };

                    // 请确保 URL 路径与后端 Controller 保持一致 (注意 Users 的大小写)
                    const response = await window.httpClient.request('/Users/register', 'POST', requestData);

                    if (response && response.code === 200) {
                        // 成功弹窗
                        Swal.fire({
                            title: '注册成功!',
                            text: '点击确定跳转到登录页面',
                            icon: 'success',
                            confirmButtonText: '确定'
                        }).then((result) => {
                            // 用户点击确定后跳转
                            window.location.href = 'login.html';
                        });
                    } else {
                        message.value = '注册失败：' + (response.msg || '请检查输入信息');
                    }
                } catch (error) {
                    message.value = '服务器连接失败，请检查网络或后端状态';
                } finally {
                    loading.value = false;
                }
            };

            return { form, loading, message, handleRegister };
        }
    }).mount('#app');
</script>
</body>
</html>
