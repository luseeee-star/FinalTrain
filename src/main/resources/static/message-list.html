<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="./http.js"></script>
    <style>
        body { margin: 0; background: #f5f7fb; font-family: "Microsoft YaHei", Arial, sans-serif; color: #1f2937; }
        .wrap { max-width: 600px; margin: 0 auto; padding: 18px; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(15, 23, 42, 0.06); padding: 14px; margin-bottom: 12px; }
        .title { margin: 0; font-size: 18px; }
        .hint { color: #6b7280; font-size: 13px; }
        .session-list { display: grid; gap: 10px; }
        .session-item { display: flex; align-items: center; padding: 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .session-item:hover { background: #f9fafb; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #e5e7eb; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #6b7280; }
        .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .info { flex: 1; }
        .name { font-weight: 500; margin: 0; }
        .last-msg { color: #6b7280; font-size: 14px; margin: 4px 0 0 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .time { color: #9ca3af; font-size: 12px; }
        .right { text-align: right; }
        .unread { background: #ef4444; color: #fff; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; }
        .back-btn { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 10px 16px; cursor: pointer; margin-bottom: 12px; }
    </style>
</head>
<body>
<div id="app" class="wrap">
    <button class="back-btn" @click="back">返回首页</button>
    <div class="card">
        <h2 class="title">消息中心</h2>
    </div>
    <div class="card">
        <div class="session-list">
            <div v-for="session in sessions" :key="session.friendId" class="session-item" @click="openChat(session)">
                <div class="avatar">
                    <img v-if="session.friendAvatarUrl" :src="'/msg/' + session.friendAvatarUrl" alt="头像">
                    <span v-else>{{ session.friendName.charAt(0) }}</span>
                </div>
                <div class="info">
                    <div class="name">{{ session.friendName }}</div>
                    <div class="last-msg">{{ session.lastContent }}</div>
                </div>
                <div class="right">
                    <div class="time">{{ formatTime(session.lastTime) }}</div>
                    <div v-if="session.unreadCount > 0" class="unread">{{ session.unreadCount }}</div>
                </div>
            </div>
            <div v-if="sessions.length === 0" class="hint">暂无私信</div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
        setup() {
            const sessions = ref([]);
            const http = {
                get: function (url) {
                    return window.httpClient.request(url, 'GET');
                }
            };

            function formatTime(v) {
                if (!v) return '';
                const d = new Date(v);
                if (isNaN(d.getTime())) return String(v);
                const now = new Date();
                const diff = now - d;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                if (days === 0) {
                    const hh = String(d.getHours()).padStart(2, '0');
                    const mm = String(d.getMinutes()).padStart(2, '0');
                    return hh + ':' + mm;
                } else if (days === 1) {
                    return '昨天';
                } else if (days < 7) {
                    return days + '天前';
                } else {
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    return y + '-' + m + '-' + day;
                }
            }

            function openChat(session) {
                window.location.href = 'chat.html?friendId=' + session.friendId + '&friendName=' + encodeURIComponent(session.friendName);
            }

            function back() {
                window.location.href = 'index.html';
            }

            onMounted(async function () {
                try {
                    const resp = await http.get('/message/sessions');
                    if (resp && resp.code === 200) {
                        sessions.value = resp.data || [];
                    } else {
                        alert('加载失败：' + (resp && resp.msg));
                    }
                } catch (e) {
                    alert('加载失败：' + e.message);
                }
            });

            return {
                sessions,
                formatTime,
                openChat,
                back
            };
        }
    }).mount('#app');
</script>
</body>
</html>
